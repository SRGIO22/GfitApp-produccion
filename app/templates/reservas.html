<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GfitApp - Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
    
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; }
        .text-gold { color: #ffc107; }
        .btn-horario {
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 20px;
            border-radius: 15px; transition: all 0.3s ease; cursor: pointer;
            text-align: left; width: 100%; margin-bottom: 15px;
        }
        .btn-horario:hover {
            transform: translateY(-5px); border-color: #ffc107; background: #252525;
        }
        .aforo-badge {
            background: rgba(255, 193, 7, 0.1); color: #ffc107; padding: 5px 10px;
            border-radius: 5px; font-size: 0.8rem;
        }
        .modal-content { background: #1a1a1a; border: 1px solid #ffc107; color: white; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="fw-bold">ELIGE TU <span class="text-gold">HORARIO</span></h1>
            <p class="text-secondary">Sala de Pesas - Duración: 1h 30min</p>
            <input type="date" id="fechaReserva" class="form-control d-inline-block w-auto bg-dark text-white border-secondary mb-4">
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <button class="btn-horario shadow" id="btn-18" onclick="validarYAbrir('8:00 - 9:30', 8)">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="mb-1">8:00 - 9:30'</h4>
                            <span class="text-secondary">Turno Mañana</span>
                        </div>
                        <span class="aforo-badge">Aforo: {{ conteos['8:00 - 9:30'] }} / 20</span>
                    </div>
                </button>

                <button class="btn-horario shadow" id="btn-18" onclick="validarYAbrir('10:00 - 11:30', 10)">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="mb-1">10:00 - 11:30</h4>
                            <span class="text-secondary">Turno Mañana</span>
                        </div>
                        <span class="aforo-badge">Aforo: {{ conteos['10:00 - 11:30'] }} / 20</span>
                    </div>
                </button>

                <button class="btn-horario shadow" onclick="validarYAbrir('18:00 - 19:30', 18)">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="mb-1">18:00 - 19:30</h4>
                            <span class="text-secondary">Turno Tarde</span>
                        </div>
                        <span class="aforo-badge">Aforo: {{ conteos['18:00 - 19:30'] }} / 20</span>
                    </div>
                </button>
                
                <div class="text-center mt-4">
                    <a href="/" class="text-secondary text-decoration-none">← Volver al panel</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-gold">Resumen de la Reserva</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="p-3 bg-dark rounded border border-secondary">
                        <p class="mb-0"><strong>Clase:</strong> Sala de Pesas</p>
                        <p class="mb-0"><strong>Día:</strong> <span id="resumenDia"></span></p>
                        <p class="mb-0"><strong>Hora:</strong> <span id="resumenHora"></span></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning fw-bold" onclick="finalizarTodo()">CONFIRMAR RESERVA</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Fecha por defecto
        document.getElementById('fechaReserva').valueAsDate = new Date();

        let horaSeleccionada = "";

        function validarYAbrir(rango, horaInicio) {
            const ahora = new Date();
            const horaActual = ahora.getHours();
            const fechaInput = document.getElementById('fechaReserva').value;
            const fechaSeleccionada = new Date(fechaInput);

            // Bloqueo de horas pasadas si es hoy
            if (fechaSeleccionada.toDateString() === ahora.toDateString() && horaActual >= horaInicio) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'Horario pasado', 
                    text: 'Esta clase ya ha comenzado o terminado.',
                    background: '#1a1a1a', 
                    color: '#fff' 
                });
                return;
            }

            horaSeleccionada = rango;
            document.getElementById('resumenDia').innerText = fechaInput;
            document.getElementById('resumenHora').innerText = rango;
            
            const myModal = new bootstrap.Modal(document.getElementById('modalConfirmar'));
            myModal.show();
        }

        function finalizarTodo() {
            const fecha = document.getElementById('fechaReserva').value;
            
            fetch('/confirmar_reserva_real', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    clase: "Sala de Pesas",
                    fecha: fecha,
                    hora: horaSeleccionada
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Reservado!',
                        text: 'Tu clase se ha guardado correctamente.',
                        background: '#1a1a1a',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = '/perfil';
                    });
                } else {
                    Swal.fire('Error', 'No se pudo guardar la reserva.', 'error');
                }
            })
            .catch(err => {
                Swal.fire('Error', 'Error de conexión con el servidor.', 'error');
            });
        }
    </script>
</body>
</html>
