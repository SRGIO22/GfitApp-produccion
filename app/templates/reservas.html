<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas – GFitApp</title>
    <meta name="description" content="Reserva tu clase en GFitApp de forma rápida y sencilla.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
    <link rel="icon" href="https://framerusercontent.com/images/8bOBdZc7pcumKLrCZagKXJMKfrE.png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="https://framerusercontent.com/images/e0eyT5DJoqOkBYq9GE3nO7YiA.png" media="(prefers-color-scheme: dark)">
</head>
<body>
    <nav>
        <a href="index.html" class="nav-back">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
        <a href="index.html" class="nav-brand">GFitApp</a>
    </nav>

    <main>
        <div class="burbuja mx-auto text-center">
            <h2 class="titulo">Reserva tu Clase</h2>
            <p class="subtitulo">
                Selecciona una clase y revisa los detalles antes de confirmar tu asistencia.
            </p>
        </div>

        <form id="formReserva" class="burbuja mx-auto form-max">
            <div id="formFeedback" class="alert-danger" style="display:none;"></div>
            <div id="formSuccess" class="alert-success" style="display:none;"></div>

            <div class="mb-3">
                <label for="clase" class="form-label"><strong>Clase</strong></label>
                <select id="clase" name="clase_id" class="form-select" required>
                    <option value="">Selecciona una clase</option>
                </select>
            </div>

            <div id="infoClase" class="p-3 mt-3 border rounded bg-light d-none">
                <h5 class="mb-3"><i class="bi bi-info-circle"></i> Detalles de la clase</h5>
                <p><strong>Fecha:</strong> <span id="infoFecha"></span></p>
                <p><strong>Hora:</strong> <span id="infoHora"></span></p>
                <p><strong>Duración:</strong> <span id="infoDuracion"></span> min</p>
                <p><strong>Entrenador:</strong> <span id="infoEntrenador"></span></p>
            </div>

            <input type="hidden" id="socio" name="id_socio" value="">

            <div class="botones mt-4">
                <button type="submit" class="btn btn-dark" id="btnConfirmarReserva">
                    <i class="bi bi-check2-circle"></i> Confirmar reserva
                </button>
                <button type="reset" class="btn btn-secondary">
                    <i class="bi bi-eraser"></i> Borrar campos
                </button>
            </div>
        </form>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 GFitApp &mdash; Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../static/script.js"></script>
</body>
</html>
