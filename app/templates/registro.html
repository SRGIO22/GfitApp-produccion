<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - GfitApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #ffc107; padding: 30px; width: 100%; max-width: 450px; border-radius: 15px; }
        label { color: #ffc107; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input { margin-bottom: 20px; background: #222 !important; border: 1px solid #444 !important; color: white !important; }
        input:focus { border-color: #ffc107 !important; box-shadow: 0 0 0 0.25 row rgba(255, 193, 7, 0.25) !important; }
    </style>
</head>
<body>
    <div class="card shadow-lg">
        <h2 class="text-center text-warning fw-bold mb-4">UNIRSE A GFIT</h2>
        <form action="/registro" method="POST">
            <div class="mb-1">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Samuel Moreno" required minlength="3">
            </div>

            <div class="mb-1">
                <label>Correo Electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="nombre@ejemplo.com" required>
            </div>

            <div class="mb-1">
                <label>DNI (8 números + letra)</label>
                <input type="text" name="dni" class="form-control" placeholder="12345678X" required pattern="[0-9]{8}[A-Za-z]{1}" title="Debe tener 8 números y una letra">
            </div>

            <div class="mb-1">
                <label>Contraseña (Mín. 6 caracteres)</label>
                <input type="password" name="password" class="form-control" placeholder="••••••" required minlength="6">
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mt-2">CREAR MI CUENTA</button>
        </form>
        <p class="text-center mt-4 mb-0"><a href="/login" class="text-secondary text-decoration-none small">¿Ya tienes cuenta? Iniciar sesión</a></p>
    </div>
</body>
</html>
