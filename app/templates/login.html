<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GfitApp - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("/static/img/gym.webp");
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }
        .login-card {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid #ffc107;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .form-control {
            background: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus {
            background: #333;
            color: white;
            border-color: #ffc107;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card p-5 shadow-lg">
                    <h2 class="text-center fw-bold mb-4">GFIT<span class="text-warning">APP</span></h2>
                    
                    {% with messages = get_flashed_messages() %}
                      {% if messages %}
                        {% for message in messages %}
                          <div class="alert alert-danger py-2 small">{{ message }}</div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label small text-secondary">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="admin@gfit.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small text-secondary">Contraseña</label>
                            <input type="password" name="password" class="form-control" placeholder="****" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2">ENTRAR</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/" class="text-secondary small text-decoration-none">← Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
