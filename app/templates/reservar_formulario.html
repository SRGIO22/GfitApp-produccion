<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Turno - GfitApp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0 text-center">Confirmar Horario</h4>
                    </div>
                    <div class="card-body">
                        <form action="{{ url_for('guardar_reserva') }}" method="POST">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Actividad Seleccionada</label>
                                <input type="text" name="actividad" class="form-control bg-secondary-subtle text-capitalize fw-semibold" value="{{ actividad_seleccionada }}" readonly>
                            </div>

                            <div class="mb-3">
                                <label for="hora" class="form-label fw-bold">Turno Disponible</label>
                                <select class="form-select" name="hora" id="hora" required>
                                    <option value="" disabled selected>Selecciona una hora...</option>
                                    <option value="08:00">08:00 a 09:30</option>
                                    <option value="10:00">10:00 a 11:30</option>
                                    <option value="17:00">17:00 a 18:30</option>
                                    <option value="19:00">19:00 a 20:30</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="fecha" class="form-label fw-bold">Fecha</label>
                                <input type="date" class="form-control" name="fecha" id="fecha" value="2026-05-18" required>
                            </div>

                            <div class="d-flex gap-2">
                                <a href="{{ url_for('nueva_reserva_seleccion') }}" class="btn btn-outline-secondary w-50">Volver atrás</a>
                                <button type="submit" class="btn btn-success w-50">Confirmar Reserva</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
